<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Enterprise Web Application สำหรับระบบทบทวน 12 กิจกรรมการพยาบาล"
    />

    <link rel="icon" type="image/png" href="icon APP.png" />
